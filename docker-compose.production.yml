services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-zuzz}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-zuzz_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zuzz} -d ${DB_NAME:-zuzz_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: npx prisma migrate deploy --schema ./prisma/schema.prisma
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    restart: always
    env_file: .env.production
    environment:
      GIT_SHA: ${GIT_SHA:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    expose:
      - "4000"
    volumes:
      - uploads_data:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    env_file: .env.production
    depends_on:
      - api
    expose:
      - "3000"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: always
    env_file: .env.production
    depends_on:
      - api
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - api
      - web
      - admin

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_webroot:
